<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Surgical Package Pricing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --navy: #eaf4fd;
    --navy2: #dceefb;
    --card: #ffffff;
    --gold: #b8863f;
    --text: #10243a;
    --muted: #5b7691;
    --border: #c3d8ea;
    --danger-border: #e5b8b8;
    --danger-text: #b23c3c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: linear-gradient(180deg, var(--navy) 0%, #d5e9f9 100%);
    color: var(--text);
    font-family: Tahoma, "Segoe UI", Arial, sans-serif;
  }
  #app { min-height: 100vh; padding: 24px 20px 60px; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: #a9c4dd; border-radius: 4px; }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 18px;
  }
  h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 0.2px; }
  .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #save-indicator { font-size: 12px; color: var(--muted); margin-left: 6px; margin-right: 6px; }

  button { cursor: pointer; font-family: inherit; }
  .btn-gold {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gold); color: #1a1305; border: none;
    border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700;
  }
  .btn-gold:disabled { opacity: 0.5; cursor: default; }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px; font-size: 13px;
  }

  .filter-bar { display: flex; flex-wrap: wrap; gap: 22px; margin-bottom: 22px; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-label { font-size: 11px; color: var(--muted); font-weight: 600; }
  .filter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 5px 12px; font-size: 12.5px;
  }
  .pill.active { background: var(--gold); color: #1a1305; border-color: var(--gold); font-weight: 700; }

  main#main { display: flex; flex-direction: column; gap: 20px; }
  .empty { color: var(--muted); text-align: center; padding: 40px; font-size: 14px; }

  .lookup-card {
    background: var(--card); border: 1px solid var(--gold); border-radius: 12px;
    padding: 16px; margin-bottom: 22px;
  }
  .lookup-title { margin: 0; font-size: 16px; font-weight: 700; color: var(--gold); }
  .lookup-sub { margin: 4px 0 10px; color: var(--muted); font-size: 12.5px; }
  tr.lookup-best { background: rgba(184,134,63,0.14); }
  .best-badge {
    display: inline-block; font-size: 10px; font-weight: 700; color: #1a1305;
    background: var(--gold); border-radius: 999px; padding: 2px 8px; margin-left: 6px; vertical-align: middle;
  }
  tr.lookup-empty td { color: var(--muted); font-style: italic; font-size: 12.5px; }
  tr.lookup-selected { outline: 2px solid var(--gold); outline-offset: -2px; }

  .selected-panel {
    margin-top: 18px; padding: 16px; border-radius: 10px;
    background: var(--navy2); border: 1px solid var(--gold);
  }
  .selected-panel-header { margin-bottom: 10px; }
  .selected-panel-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .selected-panel-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  table.panel-table { width: 100%; border-collapse: collapse; }
  table.panel-table td { padding: 6px 4px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .panel-label { color: var(--muted); }
  .panel-value { text-align: right; font-weight: 600; }
  tr.panel-total-row td { border-bottom: none; padding-top: 10px; font-size: 15px; }
  tr.panel-total-row .panel-label { color: var(--text); font-weight: 700; }
  tr.panel-total-row .panel-value { color: var(--gold); font-weight: 700; }
  .panel-notes { margin-top: 10px; font-size: 12.5px; color: var(--muted); font-style: italic; }
  .panel-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  .proc-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .proc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .proc-tag {
    font-size: 11px; background: var(--navy2); color: var(--gold);
    border: 1px solid rgba(184,134,63,0.4); border-radius: 6px; padding: 3px 9px;
    font-weight: 700; white-space: nowrap;
  }
  .proc-title { margin: 0; font-size: 15.5px; font-weight: 700; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 780px; }
  th {
    text-align: center; font-size: 11.5px; color: var(--muted); font-weight: 600;
    padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tr.row { border-bottom: 1px solid rgba(38,55,77,0.33); }
  td { padding: 6px 4px; text-align: center; }
  td.td-hospital { padding: 8px; font-size: 13px; font-weight: 700; color: var(--gold); white-space: nowrap; }
  td.td-total { padding: 6px 8px; font-weight: 700; font-size: 13.5px; white-space: nowrap; }
  td.td-actions { display: flex; gap: 4px; justify-content: center; padding: 6px 4px; }

  .cell-input {
    width: 82px; background: var(--navy2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px; font-size: 12.5px; text-align: center;
  }
  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 5px 8px; display: inline-flex; align-items: center; font-size: 12px;
  }
  .icon-btn.danger { border-color: var(--danger-border); color: var(--danger-text); }

  .row-footer { margin-top: 10px; }
  .add-hospital-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .small-select {
    background: var(--navy2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 8px; font-size: 12.5px;
  }
  .dashed-btn {
    display: inline-flex; align-items: center; gap: 6px; background: transparent;
    border: 1px dashed var(--border); color: var(--muted); border-radius: 8px;
    padding: 6px 12px; font-size: 12px;
  }
  .all-added-note { font-size: 12px; color: var(--muted); font-style: italic; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(5,10,18,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px;
  }
  .modal {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; width: 380px; max-width: 100%; max-height: 88vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .modal-title { margin: 0; font-size: 16px; }
  .field-label { font-size: 11.5px; color: var(--muted); margin-top: 10px; margin-bottom: 4px; display: block; }
  .modal-input {
    background: var(--navy); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 10px; font-size: 13px; width: 100%; font-family: inherit;
  }
  .fee-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .fee-grid-label { display: block; font-size: 10.5px; color: var(--muted); margin-bottom: 3px; }
  .running-total { margin-top: 12px; font-size: 14px; color: var(--gold); border-top: 1px solid var(--border); padding-top: 10px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  const HOSPITALS = ["Al-Safa", "Welcare", "Al-Ofoq", "Al-Faransawy", "Al-Riyadh", "King Fahd", "Kids Hospital"];

  const CATEGORIES = [
    { id: "open", label: "Open Surgery" },
    { id: "endo", label: "Endoscopic" },
    { id: "lap", label: "Laparoscopic" },
  ];

  const SEED_PROCEDURES = [
    { name: "Open Radical Nephrectomy", cat: "open" },
    { name: "Open Partial Nephrectomy", cat: "open" },
    { name: "Open Pyeloplasty", cat: "open" },
    { name: "Open Radical Cystectomy", cat: "open" },
    { name: "Hypospadias Repair", cat: "open" },
    { name: "Open Orchiectomy", cat: "open" },
    { name: "Open Varicocelectomy", cat: "open" },
    { name: "Open Bilateral Varicocelectomy", cat: "open" },
    { name: "Hydrocelectomy", cat: "open" },
    { name: "Penile Prosthesis Implantation", cat: "open" },
    { name: "Bipolar TURP – Transurethral Resection of the Prostate", cat: "endo" },
    { name: "Monopolar TURP – Transurethral Resection of the Prostate", cat: "endo" },
    { name: "Endoscopic Enucleation of the Prostate (HoLEP/ThuLEP)", cat: "endo" },
    { name: "PCNL – Percutaneous Nephrolithotomy", cat: "endo" },
    { name: "URS – Ureteroscopy", cat: "endo" },
    { name: "RIRS – Retrograde Intrarenal Surgery", cat: "endo" },
    { name: "Rezum – Water Vapor Thermal Therapy for BPH", cat: "endo" },
    { name: "ESWL – Extracorporeal Shockwave Lithotripsy", cat: "endo" },
    { name: "Diagnostic Cystoscopy", cat: "endo" },
    { name: "Laser Cystolithotripsy (Bladder Stone Fragmentation)", cat: "endo" },
    { name: "TURBT – Transurethral Resection of Bladder Tumor", cat: "endo" },
    { name: "DJ Stent Fixation (Insertion)", cat: "endo" },
    { name: "DJ Stent Removal", cat: "endo" },
    { name: "DJ Stent Exchange", cat: "endo" },
    { name: "Bladder Neck Incision (BNI)", cat: "endo" },
    { name: "VIU – Visual Internal Urethrotomy", cat: "endo" },
    { name: "Laparoscopic Nephrectomy", cat: "lap" },
    { name: "Laparoscopic Pyeloplasty", cat: "lap" },
    { name: "Laparoscopic Radical Prostatectomy", cat: "lap" },
    { name: "Laparoscopic Varicocelectomy", cat: "lap" },
    { name: "Laparoscopic Renal Cyst Excision", cat: "lap" },
  ];

  // Anesthesia fees are the same regardless of hospital, keyed by exact procedure name.
  const SEED_ANESTHESIA_PRICES = {
    "Bipolar TURP – Transurethral Resection of the Prostate": 4000,
    "Bladder Neck Incision (BNI)": 3500,
    "Diagnostic Cystoscopy": 2000,
    "DJ Stent Exchange": 2500,
    "DJ Stent Fixation (Insertion)": 2500,
    "DJ Stent Removal": 1500,
    "Endoscopic Enucleation of the Prostate (HoLEP/ThuLEP)": 5000,
    "Laser Cystolithotripsy (Bladder Stone Fragmentation)": 3500,
    "Monopolar TURP – Transurethral Resection of the Prostate": 3000,
    "PCNL – Percutaneous Nephrolithotomy": 3000,
    "TURBT – Transurethral Resection of Bladder Tumor": 3000,
    "Rezum – Water Vapor Thermal Therapy for BPH": 4000,
    "RIRS – Retrograde Intrarenal Surgery": 4000,
    "URS – Ureteroscopy": 3000,
    "VIU – Visual Internal Urethrotomy": 2500,
    "Hydrocelectomy": 2000,
    "Hypospadias Repair": 2500,
    "Open Bilateral Varicocelectomy": 3500,
    "Open Orchiectomy": 3000,
    "Open Partial Nephrectomy": 4000,
    "Open Pyeloplasty": 3500,
    "Open Radical Cystectomy": 6000,
    "Open Radical Nephrectomy": 5000,
    "Open Varicocelectomy": 3000,
    "Penile Prosthesis Implantation": 4000,
    "Laparoscopic Nephrectomy": 5000,
    "Laparoscopic Pyeloplasty": 4000,
    "Laparoscopic Radical Prostatectomy": 5000,
    "Laparoscopic Varicocelectomy": 3000,
    "Laparoscopic Renal Cyst Excision": 3000,
  };
  // Used to auto-populate the "Hospital" fee field for that hospital/procedure combo.
  const SEED_HOSPITAL_PRICES = {
    "Al-Ofoq": {
      "Open Radical Nephrectomy": 12000,
      "Open Partial Nephrectomy": 12000,
      "Open Pyeloplasty": 12000,
      "Open Radical Cystectomy": 39800,
      "Hypospadias Repair": 8400,
      "Open Orchiectomy": 4300,
      "Open Varicocelectomy": 3700,
      "Open Bilateral Varicocelectomy": 4800,
      "Hydrocelectomy": 4100,
      "Penile Prosthesis Implantation": 9800,
      "Bipolar TURP – Transurethral Resection of the Prostate": 14300,
      "Monopolar TURP – Transurethral Resection of the Prostate": 10300,
      "Endoscopic Enucleation of the Prostate (HoLEP/ThuLEP)": 34300,
      "PCNL – Percutaneous Nephrolithotomy": 16300,
      "URS – Ureteroscopy": 24800,
      "RIRS – Retrograde Intrarenal Surgery": 24800,
      "Diagnostic Cystoscopy": 3300,
      "Laser Cystolithotripsy (Bladder Stone Fragmentation)": 15500,
      "TURBT – Transurethral Resection of Bladder Tumor": 8400,
      "DJ Stent Fixation (Insertion)": 5500,
      "DJ Stent Removal": 2300,
      "DJ Stent Exchange": 5750,
      "Bladder Neck Incision (BNI)": 7700,
      "Laparoscopic Nephrectomy": 17300,
      "Laparoscopic Pyeloplasty": 22100,
      "Laparoscopic Varicocelectomy": 7000,
      "Laparoscopic Renal Cyst Excision": 10300,
    },
    "Al-Faransawy": {},
    "King Fahd": {
      "Open Varicocelectomy": 5250,
      "Hydrocelectomy": 5250,
      "Bipolar TURP – Transurethral Resection of the Prostate": 11410,
      "Monopolar TURP – Transurethral Resection of the Prostate": 11360,
      "Endoscopic Enucleation of the Prostate (HoLEP/ThuLEP)": 15810,
      "PCNL – Percutaneous Nephrolithotomy": 14720,
      "URS – Ureteroscopy": 14670,
      "Diagnostic Cystoscopy": 7290,
      "RIRS – Retrograde Intrarenal Surgery": 15220,
      "Rezum – Water Vapor Thermal Therapy for BPH": 44000,
      "DJ Stent Fixation (Insertion)": 10340,
      "DJ Stent Removal": 4840,
      "DJ Stent Exchange": 10340,
      "Bladder Neck Incision (BNI)": 9120,
      "VIU – Visual Internal Urethrotomy": 8690,
      "Laparoscopic Nephrectomy": 28570,
    },
    "Welcare": {
      "Bipolar TURP – Transurethral Resection of the Prostate": { hospitalFee: 18000, endoscopyFee: 5000 },
      "Bladder Neck Incision (BNI)": { hospitalFee: 15000, endoscopyFee: 2000 },
      "Diagnostic Cystoscopy": { hospitalFee: 12000, endoscopyFee: 1000 },
      "DJ Stent Removal": { hospitalFee: 10000, endoscopyFee: 1000 },
      "DJ Stent Fixation (Insertion)": { hospitalFee: 15000, endoscopyFee: 1000 },
      "Endoscopic Enucleation of the Prostate (HoLEP/ThuLEP)": { hospitalFee: 50000, endoscopyFee: 38000 },
      "Laser Cystolithotripsy (Bladder Stone Fragmentation)": { hospitalFee: 15000, endoscopyFee: 7000 },
      "Monopolar TURP – Transurethral Resection of the Prostate": { hospitalFee: 15000, endoscopyFee: 2000 },
      "PCNL – Percutaneous Nephrolithotomy": { hospitalFee: 22000, endoscopyFee: 2500 },
      "RIRS – Retrograde Intrarenal Surgery": { hospitalFee: 18000, endoscopyFee: 18000 },
      "TURBT – Transurethral Resection of Bladder Tumor": { hospitalFee: 18000, endoscopyFee: 5000 },
      "URS – Ureteroscopy": { hospitalFee: 15000, endoscopyFee: 2000 },
      "Open Varicocelectomy": { hospitalFee: 15000 },
      "Open Bilateral Varicocelectomy": { hospitalFee: 18000 },
      "Hydrocelectomy": { hospitalFee: 15000 },
      "Open Partial Nephrectomy": { hospitalFee: 30000 },
    },
  };

  const FEE_FIELDS = [
    { key: "hospitalFee", label: "Hospital" },
    { key: "endoscopyFee", label: "Endoscopy / Equipment" },
    { key: "surgeonFee", label: "Surgeon" },
    { key: "assistantFee", label: "Assistant(s)" },
    { key: "anesthesiaFee", label: "Anesthesia" },
    { key: "coworkersFee", label: "Staff / Consumables" },
  ];

  const STORAGE_KEY = "urology-surgical-packages-v1";

  // ---------- state ----------
  let packages = [];
  let loaded = false;
  let hospitalFilter = "All";
  let catFilter = "All";
  let lookupProcedure = "";
  let selectedPackageId = null;
  let saveState = "idle";
  let saveTimer = null;

  // ---------- helpers ----------
  function uid() {
    return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
  }

  function emptyPackage(overrides) {
    return Object.assign(
      {
        id: uid(),
        procedure: "",
        category: "open",
        hospital: HOSPITALS[0],
        hospitalFee: "",
        endoscopyFee: "",
        surgeonFee: "",
        assistantFee: "",
        anesthesiaFee: "",
        coworkersFee: "500",
        notes: "",
      },
      overrides || {}
    );
  }

  function toNum(v) {
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  }

  function total(pkg) {
    return FEE_FIELDS.reduce((sum, f) => sum + toNum(pkg[f.key]), 0);
  }

  function fmt(n) {
    return "EGP " + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  const CATEGORY_ORDER = { endo: 0, open: 1, lap: 2 };

  function categoryLabel(id) {
    const c = CATEGORIES.find((c) => c.id === id);
    return c ? c.label : id;
  }

  function sortByCategoryThenName(list, nameKey) {
    return list.slice().sort((a, b) => {
      const orderA = CATEGORY_ORDER[a.category] != null ? CATEGORY_ORDER[a.category] : 99;
      const orderB = CATEGORY_ORDER[b.category] != null ? CATEGORY_ORDER[b.category] : 99;
      if (orderA !== orderB) return orderA - orderB;
      return a[nameKey].localeCompare(b[nameKey]);
    });
  }

  // ---------- persistence ----------
  function baseSeedPackages() {
    const ofoqPrices = SEED_HOSPITAL_PRICES["Al-Ofoq"] || {};
    return SEED_PROCEDURES.map((p) =>
      emptyPackage({
        procedure: p.name,
        category: p.cat,
        hospital: "Al-Ofoq",
        hospitalFee: ofoqPrices[p.name] != null ? String(ofoqPrices[p.name]) : "",
      })
    );
  }

  function ensureSeedHospitalPrices() {
    let added = false;
    Object.keys(SEED_HOSPITAL_PRICES).forEach((hospital) => {
      const priceMap = SEED_HOSPITAL_PRICES[hospital];
      Object.keys(priceMap).forEach((procName) => {
        const exists = packages.some((p) => p.procedure === procName && p.hospital === hospital);
        if (!exists) {
          const entry = priceMap[procName];
          const fees = typeof entry === "number" ? { hospitalFee: entry } : entry;
          const procMeta = SEED_PROCEDURES.find((p) => p.name === procName);
          const category = procMeta ? procMeta.cat : "open";
          packages.push(
            emptyPackage({
              procedure: procName,
              category,
              hospital,
              hospitalFee: fees.hospitalFee != null ? String(fees.hospitalFee) : "",
              endoscopyFee: fees.endoscopyFee != null ? String(fees.endoscopyFee) : "",
            })
          );
          added = true;
        }
      });
    });
    return added;
  }

  function fillDefaultStaffFee() {
    let changed = false;
    packages.forEach((p) => {
      if (p.coworkersFee === "" || p.coworkersFee == null) {
        p.coworkersFee = "500";
        changed = true;
      }
    });
    return changed;
  }

  function ensureAnesthesiaFees() {
    let changed = false;
    packages.forEach((p) => {
      const known = SEED_ANESTHESIA_PRICES[p.procedure];
      if (known != null && (p.anesthesiaFee === "" || p.anesthesiaFee == null)) {
        p.anesthesiaFee = String(known);
        changed = true;
      }
    });
    return changed;
  }

  async function loadData() {
    try {
      const res = await window.storage.get(STORAGE_KEY, false);
      if (res && res.value) {
        packages = JSON.parse(res.value);
      } else {
        packages = baseSeedPackages();
      }
    } catch (e) {
      packages = baseSeedPackages();
    }
    const addedRows = ensureSeedHospitalPrices();
    const filledStaff = fillDefaultStaffFee();
    const filledAnesthesia = ensureAnesthesiaFees();
    loaded = true;
    renderAll();
    if (addedRows || filledStaff || filledAnesthesia) scheduleSave();
  }

  function scheduleSave() {
    saveState = "saving";
    updateSaveIndicator();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(packages), false);
        saveState = "saved";
      } catch (e) {
        saveState = "idle";
      }
      updateSaveIndicator();
    }, 400);
  }

  function updateSaveIndicator() {
    const el = document.getElementById("save-indicator");
    if (el) el.textContent = saveState === "saving" ? "Saving…" : "Saved";
  }

  // ---------- derived data ----------
  function getFiltered() {
    return packages.filter(
      (p) =>
        (hospitalFilter === "All" || p.hospital === hospitalFilter) &&
        (catFilter === "All" || p.category === catFilter)
    );
  }

  function getGrouped() {
    const map = {};
    getFiltered().forEach((p) => {
      if (!map[p.procedure]) map[p.procedure] = [];
      map[p.procedure].push(p);
    });
    return map;
  }

  function getUniqueProcedures() {
    const map = new Map();
    SEED_PROCEDURES.forEach((p) => map.set(p.name, p.cat));
    packages.forEach((p) => map.set(p.procedure, p.category));
    return Array.from(map, ([name, category]) => ({ name, category }));
  }

  // ---------- mutations ----------
  function deletePkg(id) {
    packages = packages.filter((p) => p.id !== id);
    renderAll();
    scheduleSave();
  }

  function createPackage(data) {
    packages.push(emptyPackage(data));
    renderAll();
    scheduleSave();
  }

  function updatePkgFields(id, patch) {
    const pkg = packages.find((p) => p.id === id);
    if (pkg) Object.assign(pkg, patch);
  }

  function anesthesiaDefaultFor(procName) {
    const known = SEED_ANESTHESIA_PRICES[procName];
    return known != null ? String(known) : "";
  }

  function duplicateToAllHospitals(procName) {
    const example = packages.find((p) => p.procedure === procName);
    if (!example) return;
    const missing = HOSPITALS.filter(
      (h) => !packages.some((p) => p.procedure === procName && p.hospital === h)
    );
    missing.forEach((h) => {
      packages.push(
        emptyPackage({
          procedure: procName,
          category: example.category,
          hospital: h,
          anesthesiaFee: anesthesiaDefaultFor(procName),
        })
      );
    });
    renderAll();
    scheduleSave();
  }

  function addHospitalToProc(procName, hospital) {
    if (!hospital) return;
    if (packages.some((p) => p.procedure === procName && p.hospital === hospital)) return;
    const example = packages.find((p) => p.procedure === procName);
    if (!example) return;
    packages.push(
      emptyPackage({
        procedure: procName,
        category: example.category,
        hospital,
        anesthesiaFee: anesthesiaDefaultFor(procName),
      })
    );
    renderAll();
    scheduleSave();
  }

  function safeFileName(str) {
    return String(str).replace(/[^a-z0-9]+/gi, "_").replace(/^_+|_+$/g, "").slice(0, 60);
  }

  function buildPdfDoc(pkg) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const marginX = 48;
    const rightX = 545;
    let y = 60;

    doc.setFontSize(18);
    doc.setFont(undefined, "bold");
    doc.text("Surgical Package Estimate", marginX, y);
    y += 22;

    doc.setFontSize(11);
    doc.setFont(undefined, "bold");
    doc.text("Prof. Dr. Mohamed Elsheikh", marginX, y);
    y += 14;
    doc.setFont(undefined, "normal");
    doc.setFontSize(9.5);
    doc.text("Professor of Urology & Reproductive Surgery, Cairo University Faculty of Medicine", marginX, y);
    y += 12;
    doc.text("Head of Urology & Reproductive Surgery, Nasser Institute for Research and Treatment", marginX, y);
    y += 18;

    doc.setDrawColor(180);
    doc.line(marginX, y, rightX, y);
    y += 26;

    doc.setFontSize(10);
    doc.setFont(undefined, "normal");
    doc.text("Date: " + new Date().toLocaleDateString("en-GB"), marginX, y);
    y += 30;

    doc.setFontSize(15);
    doc.setFont(undefined, "bold");
    doc.text(pkg.procedure, marginX, y);
    y += 20;

    doc.setFontSize(11);
    doc.setFont(undefined, "normal");
    doc.text("Category: " + categoryLabel(pkg.category), marginX, y);
    y += 16;
    doc.text("Hospital: " + pkg.hospital, marginX, y);
    y += 30;

    doc.setFont(undefined, "bold");
    doc.setFontSize(12);
    doc.text("Price Breakdown", marginX, y);
    y += 18;
    doc.setDrawColor(220);
    doc.line(marginX, y, rightX, y);
    y += 16;

    doc.setFont(undefined, "normal");
    doc.setFontSize(11);
    FEE_FIELDS.forEach((f) => {
      const val = toNum(pkg[f.key]);
      doc.text(f.label, marginX, y);
      doc.text(val > 0 ? fmt(val) : "—", rightX, y, { align: "right" });
      y += 20;
    });

    y += 6;
    doc.setDrawColor(180);
    doc.line(marginX, y, rightX, y);
    y += 22;

    doc.setFont(undefined, "bold");
    doc.setFontSize(13);
    doc.text("Total Package Price", marginX, y);
    doc.text(fmt(total(pkg)), rightX, y, { align: "right" });
    y += 34;

    if (pkg.notes) {
      doc.setFont(undefined, "bold");
      doc.setFontSize(11);
      doc.text("Notes", marginX, y);
      y += 16;
      doc.setFont(undefined, "normal");
      const split = doc.splitTextToSize(pkg.notes, rightX - marginX);
      doc.text(split, marginX, y);
      y += split.length * 14 + 10;
    }

    doc.setFontSize(9);
    doc.setTextColor(140);
    doc.text("This is a price estimate. Final cost may vary based on clinical findings.", marginX, 780);

    return doc;
  }

  function downloadPdf(pkg) {
    const doc = buildPdfDoc(pkg);
    doc.save(safeFileName(pkg.procedure) + "_" + safeFileName(pkg.hospital) + ".pdf");
  }

  async function shareViaWhatsApp(pkg) {
    const doc = buildPdfDoc(pkg);
    const blob = doc.output("blob");
    const filename = safeFileName(pkg.procedure) + "_" + safeFileName(pkg.hospital) + ".pdf";
    const summaryText =
      pkg.procedure + "\nHospital: " + pkg.hospital + "\nTotal: " + fmt(total(pkg)) + "\n(Full breakdown attached as PDF)";

    try {
      const file = new File([blob], filename, { type: "application/pdf" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: pkg.procedure, text: summaryText });
        return;
      }
    } catch (e) {
      // fall through to fallback below
    }

    // Fallback for browsers without file-sharing support: download the PDF
    // and open WhatsApp with a text summary so it can be attached manually.
    doc.save(filename);
    window.open("https://wa.me/?text=" + encodeURIComponent(summaryText), "_blank");
  }

  function exportText() {
    const grouped = getGrouped();
    let out = "Urological Surgical Packages\n";
    out += "=".repeat(50) + "\n\n";
    Object.entries(grouped).forEach(([proc, rows]) => {
      out += proc + "\n";
      rows.forEach((r) => {
        out += "  Hospital: " + r.hospital + "\n";
        FEE_FIELDS.forEach((f) => {
          if (toNum(r[f.key]) > 0) out += "    " + f.label + ": " + fmt(toNum(r[f.key])) + "\n";
        });
        out += "    Total: " + fmt(total(r)) + "\n";
        if (r.notes) out += "    Notes: " + r.notes + "\n";
        out += "\n";
      });
    });
    const blob = new Blob([out], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "surgical-packages.txt";
    a.click();
    URL.revokeObjectURL(url);
  }

  function renderLookupResults() {
    if (!lookupProcedure) return "";
    const rows = packages.filter((p) => p.procedure === lookupProcedure);
    const byHospital = {};
    rows.forEach((r) => (byHospital[r.hospital] = r));

    const entries = HOSPITALS.map((h) => ({ hospital: h, pkg: byHospital[h] || null }));
    const priced = entries.filter((e) => e.pkg && total(e.pkg) > 0);
    const unpriced = entries.filter((e) => !e.pkg || total(e.pkg) === 0);
    priced.sort((a, b) => total(a.pkg) - total(b.pkg));
    const lowestId = priced.length ? priced[0].pkg.id : null;

    const bodyRows = priced
      .map((e) => {
        const r = e.pkg;
        const isLowest = r.id === lowestId;
        const isSelected = r.id === selectedPackageId;
        return (
          '<tr class="row' + (isLowest ? " lookup-best" : "") + (isSelected ? " lookup-selected" : "") + '">' +
            '<td class="td-hospital">' + escapeHtml(e.hospital) + (isLowest ? ' <span class="best-badge">Best price</span>' : "") + "</td>" +
            FEE_FIELDS.map((f) => '<td>' + (toNum(r[f.key]) > 0 ? fmt(toNum(r[f.key])) : "—") + "</td>").join("") +
            '<td class="td-total">' + fmt(total(r)) + "</td>" +
            '<td><button class="dashed-btn" data-action="select-package" data-id="' + r.id + '">' +
              (isSelected ? "✓ Selected" : "Select") +
            "</button></td>" +
          "</tr>"
        );
      })
      .join("");

    const unpricedRows = unpriced
      .map(
        (e) =>
          '<tr class="row lookup-empty"><td class="td-hospital">' + escapeHtml(e.hospital) + '</td><td colspan="' +
          (FEE_FIELDS.length + 2) + '">No price entered yet</td></tr>'
      )
      .join("");

    const theadCells =
      '<th>Hospital</th>' + FEE_FIELDS.map((f) => "<th>" + escapeHtml(f.label) + "</th>").join("") + "<th>Total</th><th></th>";

    const table =
      '<div class="table-wrap" style="margin-top:12px;"><table><thead><tr>' + theadCells + "</tr></thead><tbody>" +
      bodyRows + unpricedRows + "</tbody></table></div>";

    const selectedRow = rows.find((r) => r.id === selectedPackageId);
    const panel = selectedRow ? renderSelectedPackagePanel(selectedRow) : "";

    return table + panel;
  }

  function renderMain() {
    const grouped = getGrouped();
    const keys = Object.keys(grouped);
    if (keys.length === 0) {
      return '<div class="empty">No procedures match this filter.</div>';
    }
    const items = keys.map((proc) => ({ name: proc, category: grouped[proc][0].category }));
    const ordered = sortByCategoryThenName(items, "name");
    return ordered.map((item) => renderProcCard(item.name, grouped[item.name])).join("");
  }

  function renderProcCard(proc, rows) {
    const sorted = rows.slice().sort((a, b) => HOSPITALS.indexOf(a.hospital) - HOSPITALS.indexOf(b.hospital));
    const theadCells =
      '<th>Hospital</th>' +
      FEE_FIELDS.map((f) => "<th>" + escapeHtml(f.label) + "</th>").join("") +
      "<th>Total</th><th></th>";

    const bodyRows = sorted
      .map((r) => {
        const feeCells = FEE_FIELDS.map(
          (f) =>
            '<td><input class="cell-input fee-input" type="number" placeholder="0" data-id="' +
            r.id + '" data-field="' + f.key + '" value="' + escapeHtml(r[f.key]) + '" /></td>'
        ).join("");
        return (
          '<tr class="row">' +
            '<td class="td-hospital">' + escapeHtml(r.hospital) + "</td>" +
            feeCells +
            '<td class="td-total" data-total-for="' + r.id + '">' + fmt(total(r)) + "</td>" +
            '<td class="td-actions">' +
              '<button class="icon-btn" title="Edit name/notes" data-action="edit-row" data-id="' + r.id + '">✎</button>' +
              '<button class="icon-btn" title="Save/Print PDF" data-action="download-pdf" data-id="' + r.id + '">📄</button>' +
              '<button class="icon-btn" title="Share via WhatsApp" data-action="whatsapp-pdf" data-id="' + r.id + '">📤</button>' +
              '<button class="icon-btn danger" title="Delete" data-action="delete-row" data-id="' + r.id + '">🗑</button>' +
            "</td>" +
          "</tr>"
        );
      })
      .join("");

    const missingHospitals = HOSPITALS.filter((h) => !rows.some((r) => r.hospital === h));
    let footer;
    if (missingHospitals.length > 0) {
      const options = missingHospitals
        .map((h) => '<option value="' + escapeHtml(h) + '">' + escapeHtml(h) + "</option>")
        .join("");
      footer =
        '<div class="row-footer"><div class="add-hospital-row">' +
          '<select class="small-select pending-hospital-select">' + options + "</select>" +
          '<button class="dashed-btn" data-action="add-hospital" data-proc="' + escapeHtml(proc) + '">+ Add hospital</button>' +
          '<button class="dashed-btn" data-action="duplicate-all" data-proc="' + escapeHtml(proc) + '">⧉ Add all remaining</button>' +
        "</div></div>";

      footer = '<div class="row-footer"><span class="all-added-note">All hospitals added</span></div>';

    return (
      '<section class="proc-card">' +
        '<div class="proc-header">' +
          '<span class="proc-tag">' + escapeHtml(categoryLabel(rows[0].category)) + "</span>" +
          '<h2 class="proc-title">' + escapeHtml(proc) + "</h2>" +
        "</div>" +
        '<div class="table-wrap"><table><thead><tr>' + theadCells + "</tr></thead><tbody>" + bodyRows + "</tbody></table></div>" +
        footer +
      "</section>"
    );

        "</select>" +
        '<label class="field-label">2. Procedure</label>' +
        '<select class="modal-input" id="add-proc-select">' + procOptions + "</select>" +
        '<div id="add-new-proc-fields" style="display:none;">' +
          '<input class="modal-input" id="add-custom-name" placeholder="Procedure name" style="margin-top:6px;" />' +
          '<select class="modal-input" id="add-custom-category" style="margin-top:6px;">' + catOptions + "</select>" +
        "</div>" +
        '<label class="field-label" style="margin-top:14px;">3. Price breakdown</label>' +
        '<div class="fee-grid">' + feeInputs + "</div>" +
        '<div class="running-total">Total: <strong id="add-running-total">' + fmt(500) + "</strong></div>" +
        '<label class="field-label">Notes (optional)</label>' +
        '<textarea class="modal-input" id="add-notes" style="min-height:60px;resize:vertical;" placeholder="Any additional details about this package..."></textarea>' +
        '<div class="modal-actions">' +
          '<button class="btn-ghost" data-close>Cancel</button>' +
          '<button class="btn-gold" id="add-save-btn" disabled>Add Package</button>' +
        "</div>" +
      "</div>";

    document.body.appendChild(overlay);

    const hospitalSelect = overlay.querySelector("#add-hospital-select");
    const procSelect = overlay.querySelector("#add-proc-select");
    const newProcFields = overlay.querySelector("#add-new-proc-fields");
    const customNameInput = overlay.querySelector("#add-custom-name");
    const customCatSelect = overlay.querySelector("#add-custom-category");
    const saveBtn = overlay.querySelector("#add-save-btn");
    const feeInputEls = overlay.querySelectorAll(".add-fee-input");
    const runningTotalEl = overlay.querySelector("#add-running-total");

    function isNewProc() {
      return procSelect.value === NEW_PROC;
    }

    function currentProcName() {
      return isNewProc() ? customNameInput.value.trim() : procSelect.value;
    }

    function updateSaveEnabled() {
      const ok = hospitalSelect.value && currentProcName().length > 0;
      saveBtn.disabled = !ok;
    }

    function updateRunningTotal() {
      let sum = 0;
      feeInputEls.forEach((el) => (sum += toNum(el.value)));
      runningTotalEl.textContent = fmt(sum);
    }

    procSelect.addEventListener("change", () => {
      const newMode = isNewProc();
      newProcFields.style.display = newMode ? "block" : "none";
      if (!newMode) {
        const match = uniqueProcedures.find((p) => p.name === procSelect.value);
        if (match) customCatSelect.value = match.category;
        const anesthesiaEl = overlay.querySelector('.add-fee-input[data-field="anesthesiaFee"]');
        const known = SEED_ANESTHESIA_PRICES[procSelect.value];
        if (anesthesiaEl && known != null && !anesthesiaEl.value) {
          anesthesiaEl.value = known;
          updateRunningTotal();
        }
      }
      updateSaveEnabled();
    });
    hospitalSelect.addEventListener("change", updateSaveEnabled);
    customNameInput.addEventListener("input", updateSaveEnabled);
    feeInputEls.forEach((el) => el.addEventListener("input", updateRunningTotal));

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay || e.target.hasAttribute("data-close")) {
        overlay.remove();
      }
    });

    saveBtn.addEventListener("click", () => {
      if (saveBtn.disabled) return;
      const data = { hospital: hospitalSelect.value, procedure: currentProcName() };
      if (isNewProc()) {
        data.category = customCatSelect.value;
      } else {
        const match = uniqueProcedures.find((p) => p.name === procSelect.value);
        data.category = match ? match.category : "open";
      }
      FEE_FIELDS.forEach((f) => {
        const el = overlay.querySelector('.add-fee-input[data-field="' + f.key + '"]');
        data[f.key] = el ? el.value : "";
      });
      data.notes = overlay.querySelector("#add-notes").value;
      overlay.remove();
      createPackage(data);
    });

    // trigger initial state for procedure select
    if (uniqueProcedures.length === 0) {
      procSelect.value = NEW_PROC;
      newProcFields.style.display = "block";
    }
    updateSaveEnabled();
  }

    if (!pkg) return;
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";

    const catOptions = CATEGORIES.map(
      (c) => '<option value="' + c.id + '"' + (c.id === pkg.category ? " selected" : "") + ">" + escapeHtml(c.label) + "</option>"
    ).join("");
    const hospitalOptions = HOSPITALS.map(
      (h) => '<option value="' + escapeHtml(h) + '"' + (h === pkg.hospital ? " selected" : "") + ">" + escapeHtml(h) + "</option>"
    ).join("");

    overlay.innerHTML =
      '<div class="modal">' +
        '<div class="modal-header"><h3 class="modal-title">Edit Procedure</h3><button class="icon-btn" data-close>✕</button></div>' +

        '<label class="field-label">Category</label>' +

        '<label class="field-label">Hospital</label>' +
        '<select class="modal-input" id="edit-hospital">' + hospitalOptions + "</select>" +
        '<label class="field-label">Notes</label>' +

        '<div class="modal-actions"><button class="btn-gold" id="edit-done-btn">Done</button></div>' +
      "</div>";

      if (e.target === overlay || e.target.hasAttribute("data-close")) {
        commitEdit();
        overlay.remove();
      }
    });

    function commitEdit() {
      updatePkgFields(id, {
        procedure: overlay.querySelector("#edit-name").value,
        category: overlay.querySelector("#edit-category").value,
        hospital: overlay.querySelector("#edit-hospital").value,
        notes: overlay.querySelector("#edit-notes").value,
      });
      scheduleSave();
      renderAll();
    }

    overlay.querySelector("#edit-done-btn").addEventListener("click", () => {
      commitEdit();
      overlay.remove();
    });
  }

  // ---------- event delegation ----------
  document.addEventListener("DOMContentLoaded", () => {
    const app = document.getElementById("app");

    app.addEventListener("click", (e) => {
      const t = e.target.closest("[data-action]");
      if (!t) return;
      const action = t.dataset.action;
      if (action === "open-add") openAddModal();
      else if (action === "export") exportText();
      else if (action === "delete-row") deletePkg(t.dataset.id);
      else if (action === "edit-row") openEditModal(t.dataset.id);
      else if (action === "duplicate-all") duplicateToAllHospitals(t.dataset.proc);
      else if (action === "select-package") {
        selectedPackageId = t.dataset.id;
        const resultsEl = document.getElementById("lookup-results");
        if (resultsEl) resultsEl.innerHTML = renderLookupResults();
      } else if (action === "download-pdf") {
        const pkg = packages.find((p) => p.id === t.dataset.id);
        if (pkg) downloadPdf(pkg);
      } else if (action === "whatsapp-pdf") {
        const pkg = packages.find((p) => p.id === t.dataset.id);
        if (pkg) shareViaWhatsApp(pkg);
      }
      else if (action === "add-hospital") {
        const card = t.closest(".proc-card");
        const select = card.querySelector(".pending-hospital-select");
        addHospitalToProc(t.dataset.proc, select ? select.value : "");
      } else if (action === "filter-hospital") {
        hospitalFilter = t.dataset.value;
        renderAll();
      } else if (action === "filter-cat") {
        catFilter = t.dataset.value;
        renderAll();
      }
    });

    app.addEventListener("change", (e) => {
      if (e.target.id === "lookup-select") {
        lookupProcedure = e.target.value;
        selectedPackageId = null;
        const resultsEl = document.getElementById("lookup-results");
        if (resultsEl) resultsEl.innerHTML = renderLookupResults();
      }
    });

    app.addEventListener("input", (e) => {
      if (e.target.classList.contains("fee-input")) {
        const id = e.target.dataset.id;
        const field = e.target.dataset.field;
        const pkg = packages.find((p) => p.id === id);
        if (!pkg) return;
        pkg[field] = e.target.value;
        const totalEl = app.querySelector('[data-total-for="' + id + '"]');
        if (totalEl) totalEl.textContent = fmt(total(pkg));
        scheduleSave();
      }
    });

    loadData();
  });
})();
</script>
</body>
</html>
